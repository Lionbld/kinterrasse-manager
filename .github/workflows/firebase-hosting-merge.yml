name: Deploy to Firebase Hosting on push
on:
  push:
    branches:
      - main
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install App Dependencies
        run: npm install
      - name: Install Functions Dependencies
        run: cd functions && npm install
      - name: Build
        run: npm run build
      - name: Deploy to Firebase Hosting + Functions
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KINTERRASSE_MANAGER_POS }}
          projectId: kinterrasse-manager-pos
          siteId: kinterrasse-manager
          channelId: live
          targets: hosting,functions
